<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Profile banner for Samiksha Vijayvargiya</title>
<desc>A dark indigo gradient banner with a subtle circuit-node network pattern, the name Samiksha Vijayvargiya, and the tagline AI/ML Engineer, Cloud and AWS Developer</desc>
<defs>
<linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0B1120"/>
<stop offset="55%" stop-color="#1E1B4B"/>
<stop offset="100%" stop-color="#4338CA"/>
</linearGradient>
<radialGradient id="glow" cx="50%" cy="45%" r="60%">
<stop offset="0%" stop-color="#6366F1" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="1200" height="300" fill="url(#bgGrad)"/>
<rect x="0" y="0" width="1200" height="300" fill="url(#glow)"/>

<g stroke="#A5B4FC" stroke-width="1" opacity="0.18" fill="none">
<line x1="60" y1="60" x2="220" y2="60"/>
<line x1="220" y1="60" x2="220" y2="140"/>
<line x1="220" y1="140" x2="120" y2="140"/>
<line x1="60" y1="240" x2="180" y2="240"/>
<line x1="180" y1="240" x2="180" y2="190"/>
<line x1="980" y1="50" x2="1120" y2="50"/>
<line x1="1120" y1="50" x2="1120" y2="120"/>
<line x1="1020" y1="120" x2="1120" y2="120"/>
<line x1="1000" y1="250" x2="1140" y2="250"/>
<line x1="1000" y1="250" x2="1000" y2="200"/>
</g>

<g fill="#A5B4FC" opacity="0.5">
<circle cx="60" cy="60" r="3.5"/>
<circle cx="220" cy="60" r="3.5"/>
<circle cx="220" cy="140" r="3.5"/>
<circle cx="120" cy="140" r="3.5"/>
<circle cx="60" cy="240" r="3.5"/>
<circle cx="180" cy="240" r="3.5"/>
<circle cx="180" cy="190" r="3.5"/>
<circle cx="980" cy="50" r="3.5"/>
<circle cx="1120" cy="50" r="3.5"/>
<circle cx="1120" cy="120" r="3.5"/>
<circle cx="1020" cy="120" r="3.5"/>
<circle cx="1000" cy="250" r="3.5"/>
<circle cx="1140" cy="250" r="3.5"/>
<circle cx="1000" cy="200" r="3.5"/>
</g>

<text x="600" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="54" font-weight="700" fill="#F8FAFC" letter-spacing="1">Samiksha Vijayvargiya</text>
<text x="600" y="195" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="400" fill="#C7D2FE" letter-spacing="2">AI / ML ENGINEER &#8226; CLOUD &amp; AWS DEVELOPER</text>

<line x1="500" y1="215" x2="700" y2="215" stroke="#818CF8" stroke-width="1.5" opacity="0.6"/>
</svg>
